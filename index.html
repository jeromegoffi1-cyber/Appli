<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06080c;--panel:rgba(255,255,255,.04);--panel2:rgba(255,255,255,.07);
    --line:rgba(150,175,215,.14);--line-strong:rgba(150,175,215,.30);
    --ink:#e9edf3;--ink-soft:#aeb6c2;--ink-dim:#7e889a;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;color:var(--ink);
    background:radial-gradient(ellipse 95% 55% at 50% -10%,rgba(120,150,210,.10),rgba(6,8,12,0) 60%),
      linear-gradient(180deg,#0a0d14,#07090f 55%,#05070b);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px}
  .wrap{max-width:1020px;margin:0 auto;padding:0 18px}
  .spectrum{display:flex;height:3px;width:100%;opacity:.9}.spectrum i{flex:1}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(7,9,15,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .topbar-in{max-width:1020px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .home{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid var(--line);color:var(--ink-soft);
    font-family:inherit;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border-radius:30px;cursor:pointer;transition:all .2s;font-weight:500}
  .home:hover,.home.active{background:var(--panel2);color:var(--ink);border-color:var(--line-strong)}
  .dots{display:flex;gap:8px}
  .navdot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .18s,border-color .18s}
  .navdot:hover{transform:scale(1.25)}.navdot.active{border-color:rgba(255,255,255,.85);transform:scale(1.18)}
  .date{margin-left:auto;font-size:13px;color:var(--ink-dim);font-weight:300;white-space:nowrap}

  .sec-head{margin:34px 0 4px;opacity:0;animation:rise .6s forwards}
  .eyebrow{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--ink-dim);font-weight:500;margin-bottom:10px}
  .sec-head h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:clamp(30px,5.5vw,48px);line-height:1;
    background:linear-gradient(180deg,#fff,#cdd3dc 50%,#8b95a4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sec-desc{margin-top:12px;font-size:13px;line-height:1.55;color:var(--ink-dim);max-width:640px}

  .stats{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:14px;margin:26px 0 28px}
  @media(max-width:720px){.stats{grid-template-columns:1fr}}
  .stat{background:linear-gradient(160deg,var(--panel),rgba(255,255,255,.012));border:1px solid var(--line);border-radius:16px;
    padding:20px;opacity:0;animation:rise .6s forwards;display:flex;align-items:center;gap:16px}
  .stat .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px}
  .stat .big{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;line-height:.9}
  .stat .big small{font-size:17px;color:var(--ink-dim)}
  .grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:720px){.grid9{grid-template-columns:repeat(2,1fr)}}@media(max-width:440px){.grid9{grid-template-columns:1fr}}
  .pcard{background:linear-gradient(160deg,var(--panel),rgba(255,255,255,.012));border:1px solid var(--line);border-radius:16px;
    padding:16px 16px 14px;cursor:pointer;transition:transform .2s,border-color .2s;opacity:0;animation:rise .55s forwards}
  .pcard:hover{transform:translateY(-3px);border-color:var(--line-strong)}
  .pcard .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .pcard .num{font-size:11px;color:var(--ink-dim);font-weight:700}.pcard .nm{font-size:14px;font-weight:600}
  .pcard .moments{display:flex;gap:6px;justify-content:center;margin-top:5px}
  .mdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.13)}

  .fiche{opacity:0;animation:rise .5s forwards}
  .fhead{display:flex;align-items:flex-start;gap:16px;margin:32px 0 4px}
  .fnav{display:flex;gap:8px}
  .arrow{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);
    font-size:17px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .arrow:hover{background:var(--panel2);color:var(--ink);border-color:var(--line-strong)}
  .ftitle{flex:1}
  .ftitle .fnum{font-size:12px;letter-spacing:3px;color:var(--ink-dim);font-weight:700}
  .ftitle h1{font-weight:800;font-size:clamp(32px,7vw,56px);line-height:.95;letter-spacing:.5px;margin:4px 0 0}
  .ftitle .intent{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--ink-soft);margin-top:10px;max-width:640px;line-height:1.4}
  .weekline{display:flex;align-items:center;gap:14px;margin:16px 2px 4px}
  .weekline svg{flex:1;height:46px}
  .weekline .t{font-size:12px;white-space:nowrap;text-align:right}

  .day{border:1px solid var(--line);border-radius:16px;margin-top:14px;overflow:hidden;background:linear-gradient(160deg,var(--panel),rgba(255,255,255,.012));transition:border-color .2s}
  .day.open{border-color:var(--line-strong)}
  .dhead{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
  .dhead:hover{background:var(--panel2)}
  .dhead .dn{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:21px;min-width:72px}
  .dhead .dd{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-dim)}
  .dhead .badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;background:var(--pc);color:#06080c;font-weight:700;padding:3px 9px;border-radius:20px}
  .dhead .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .dhead .gval{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;color:var(--ink-soft)}
  .dhead .mds{display:flex;gap:5px}
  .dhead .chev{color:var(--ink-dim);font-size:13px;transition:transform .25s}
  .day.open .dhead .chev{transform:rotate(90deg)}

const KEY='pilotage_v3';let mem=null;
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{days:{}};}catch(e){return mem||(mem={days:{}});}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){mem=d;}}
let DATA=load();

function iso(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function parseISO(s){var a=String(s).split("-");return new Date(+a[0],(+a[1])-1,+a[2],12,0,0,0);}
function mondayOf(dt){const x=new Date(dt);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(12,0,0,0);return x;}
const MON=mondayOf(new Date());
const WEEK=[...Array(7)].map((_,i)=>{const d=new Date(MON);d.setDate(MON.getDate()+i);return iso(d);});
function tISO(){return iso(new Date());}
const todayIdx=WEEK.indexOf(tISO());

function cell(date,pk){const d=DATA.days[date]||(DATA.days[date]={});const x=d[pk]||(d[pk]={a:{},val:{},note:'',notes:{}});if(!x.notes)x.notes={};return x;}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function peek(date,pk){const d=DATA.days[date];if(!d||!d[pk])return null;return d[pk];}
function indicator(date,pk){const c=peek(date,pk);if(!c)return null;const pil=P.find(x=>x.key===pk);
  const vals=pil.val.map((_,i)=>c.val[i]).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;}
function groupDone(c,pil,g){if(!c||!c.a||!c.a[g])return false;const n=pil.actions[g].length;let done=0;for(let i=0;i<n;i++)if(c.a[g][i])done++;return done===n;}
function anyActivity(date,pk){const c=peek(date,pk);if(!c)return false;
  const am=c.a&&Object.values(c.a).some(g=>Object.values(g||{}).some(Boolean));
  return am||Object.values(c.val||{}).some(v=>v>0)||(c.note&&c.note.length>0)||(c.notes&&Object.values(c.notes).some(t=>t&&t.length>0));}
function dayActive(date){return P.some(p=>anyActivity(date,p.key));}

/* per-pilier cycle = up to 7 REAL practice sessions (gaps allowed, dates preserved) */
function sessionsOf(pk){return Object.keys(DATA.days||{}).filter(d=>anyActivity(d,pk)).sort();}
function getCyc(pk){if(!DATA.cyc)DATA.cyc={};if(!DATA.cyc[pk]){DATA.cyc[pk]=sessionsOf(pk).slice(-7);save(DATA);}return DATA.cyc[pk];}
function pushSession(pk,date){if(!anyActivity(date,pk))return;const cyc=getCyc(pk);if(cyc.indexOf(date)<0&&cyc.length<7){cyc.push(date);cyc.sort();save(DATA);}}
function newCycle(pk){if(!DATA.cyc)DATA.cyc={};DATA.cyc[pk]=[];save(DATA);}
function buildSlots(pk){const cyc=getCyc(pk),today=tISO();
  const slots=cyc.map((d,i)=>({date:d,n:i+1,state:'done'}));
  const todayIn=cyc.indexOf(today)>=0;let complete=false;
  if(cyc.length>=7&&!todayIn)complete=true;
  else if(!todayIn)slots.push({date:today,n:cyc.length+1,state:'today'});
  while(slots.length<7)slots.push({date:null,n:slots.length+1,state:'future'});
  return{slots,complete};}
function completion(date,pk){const c=peek(date,pk),pil=P.find(x=>x.key===pk);let total=0,done=0;
  ['matin','journee','soir'].forEach(g=>{total+=pil.actions[g].length;
    if(c&&c.a&&c.a[g])for(let i=0;i<pil.actions[g].length;i++)if(c.a[g][i])done++;});
  return{done,total,pct:total?done/total:0};}
function hasBoxes(c){return c&&c.a&&Object.values(c.a).some(g=>Object.values(g||{}).some(Boolean));}
/* combined daily score: blends actions done (objective) + valeurs (felt) */
function dayScore(date,pk){const c=peek(date,pk);if(!c)return null;
  const comp=completion(date,pk).pct,felt=indicator(date,pk),hb=hasBoxes(c);
  if(felt!=null&&hb)return(comp+felt/10)/2*10;
  if(felt!=null)return felt;
  if(hb)return comp*10;
  return null;}
function compText(date,pk){const cp=completion(date,pk),felt=indicator(date,pk);
  return `Pratiques <b>${cp.done}/${cp.total}</b> · ${Math.round(cp.pct*100)}%&nbsp;&nbsp;·&nbsp;&nbsp;Ressenti <b>${felt==null?'—':felt.toFixed(1)}</b>/10`;}
function recapHTML(c){const ns=c.notes||{};const map=[['matin','☀ Matin'],['journee','◐ Midi · Journée'],['soir','☾ Soir']];
  const rows=map.filter(m=>ns[m[0]]&&ns[m[0]].trim()).map(m=>`<div class="rc-row"><span class="rc-m">${m[1]} —</span> ${esc(ns[m[0]].trim())}</div>`);
  return rows.length?rows.join(''):`<div class="rc-empty">Tes notes du matin, du midi et du soir se reporteront ici automatiquement.</div>`;}
function encourMsg(s){
  if(s==null)return["À toi de jouer","Coche tes pratiques et ressens tes valeurs : l'aiguille s'animera, et ton encouragement s'affichera ici."];
  if(s<3)return["Le premier pas compte","Tu as commencé, et c'est déjà ça. Choisis une seule action de plus aujourd'hui — un petit pas suffit pour lancer la dynamique."];
  if(s<5)return["Tu es en chemin","Tu avances. Continue à cocher ce qui te rapproche de toi, sans pression : c'est la régularité qui fait tout."];
  if(s<7)return["Belle progression","Tu tiens ton cap aujourd'hui. Tu fais ce que tu dis, et ça se sent. Garde ce rythme."];
  if(s<8.5)return["Tu es aligné","Journée solide et cohérente. Tu incarnes ce que tu veux être — savoure-le, et capitalise dessus."];
  return["Journée pleine","Tu es pleinement aligné aujourd'hui. C'est l'état que tu cherches à reproduire. Beau travail sur toi."];}
function encourHTML(date,pk,col){const m=encourMsg(dayScore(date,pk));
  return `<b style="color:${col}">${m[0]}.</b> ${m[1]}`;}

const GR=104,GLEN=Math.PI*GR;
function gaugeMarkup(id,color){const cx=120,cy=128,r=GR;let ticks='';
  for(let v=0;v<=10;v++){const t=Math.PI*(1-v/10);const big=v%5===0;
    const x1=cx+(r+2)*Math.cos(t),y1=cy-(r+2)*Math.sin(t),x2=cx+(r-(big?13:8))*Math.cos(t),y2=cy-(r-(big?13:8))*Math.sin(t);
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(150,175,215,${big?.4:.2})" stroke-width="${big?2:1.3}"/>`;}
  const tr=`M ${cx-r} ${cy} A ${r} ${r} 0 0 0 ${cx+r} ${cy}`;
  return `<svg viewBox="0 0 240 156" style="width:270px;max-width:100%">
    <defs><filter id="gg-${id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <path d="${tr}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="9" stroke-linecap="round"/>
    <path id="arc-${id}" d="${tr}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${GLEN.toFixed(1)}" stroke-dashoffset="${GLEN.toFixed(1)}" filter="url(#gg-${id})" style="transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)"/>
    ${ticks}
    <g id="ndl-${id}" style="transition:transform .5s cubic-bezier(.4,0,.2,1)"><line x1="${cx+14}" y1="${cy}" x2="${cx-(r-16)}" y2="${cy}" stroke="${color}" stroke-width="3" stroke-linecap="round"/></g>
    <circle cx="${cx}" cy="${cy}" r="7" fill="#0a0d14" stroke="${color}" stroke-width="2.5"/>
    <text id="num-${id}" x="${cx}" y="${cy-26}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-weight="700" font-size="40" fill="#f1f3f7">—</text>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="Inter" font-size="10" letter-spacing="2" fill="#7e889a">/ 10</text></svg>`;}
function setGauge(id,value,color){const arc=document.getElementById('arc-'+id),ndl=document.getElementById('ndl-'+id),num=document.getElementById('num-'+id);
  if(!arc)return;const frac=(value==null?0:value/10);arc.style.strokeDashoffset=(GLEN*(1-frac)).toFixed(1);
  ndl.setAttribute('transform',`rotate(${(frac*180).toFixed(1)} 120 128)`);num.textContent=(value==null)?'—':value.toFixed(1);}
function miniGauge(value,color){const cx=60,cy=58,r=46,LEN=Math.PI*r,frac=(value==null?0:value/10);
  const tr=`M ${cx-r} ${cy} A ${r} ${r} 0 0 0 ${cx+r} ${cy}`;
  return `<svg viewBox="0 0 120 74" style="width:100%;max-width:150px">
    <path d="${tr}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="7" stroke-linecap="round"/>
    <path d="${tr}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${LEN.toFixed(1)}" stroke-dashoffset="${(LEN*(1-frac)).toFixed(1)}"/>
    <g transform="rotate(${(frac*180).toFixed(1)} ${cx} ${cy})"><line x1="${cx+8}" y1="${cy}" x2="${cx-(r-10)}" y2="${cy}" stroke="${color}" stroke-width="2.4" stroke-linecap="round"/></g>
    <circle cx="${cx}" cy="${cy}" r="4.5" fill="#0a0d14" stroke="${color}" stroke-width="2"/>
    <text x="${cx}" y="${cy-9}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-weight="700" font-size="22" fill="#f1f3f7">${value==null?'—':value.toFixed(1)}</text></svg>`;}

function cycleSpark(pk,color){const cyc=getCyc(pk);const ser=cyc.map(d=>dayScore(d,pk));
  if(ser.filter(v=>v!=null).length<1)
   return `<div class="weekline" style="color:var(--ink-dim);font-size:13px;font-style:italic;font-family:'Cormorant Garamond',serif">Remplis tes séances pour voir la trajectoire de ton cycle.</div>`;
  const n=Math.max(ser.length,2),W=300,H=46,pad=6,ix=i=>pad+(W-2*pad)*(i/(n-1)),iy=v=>H-pad-(H-2*pad)*(v/10);
  let pts=ser.map((v,i)=>v==null?null:[ix(i),iy(v)]),segs=[],cur=[];pts.forEach(p=>{if(p)cur.push(p);else{if(cur.length){segs.push(cur);cur=[]}}});if(cur.length)segs.push(cur);
  let g=`<line x1="${pad}" y1="${iy(5)}" x2="${W-pad}" y2="${iy(5)}" stroke="rgba(150,175,215,.10)"/>`;

  pts.forEach(p=>{if(p)g+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`;});
  const v=ser.filter(x=>x!=null),diff=v.length>1?v[v.length-1]-v[0]:0,col=diff>0?'#84cc3e':diff<0?'#e8484c':'#7e889a',ar=diff>0?'▲':diff<0?'▼':'▬';
  return `<div class="weekline"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${g}</svg><span class="t" style="color:${col}">${ar} ${diff>0?'+':''}${diff.toFixed(1)}<br><span style="color:var(--ink-dim);font-size:10px;letter-spacing:1px">CYCLE</span></span></div>`;}

function cycleStats(pk){const cyc=getCyc(pk).filter(d=>anyActivity(d,pk));
  const scores=cyc.map(d=>dayScore(d,pk)).filter(v=>v!=null);
  const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:null;
  return {avg,done:cyc.length,scored:scores.length};}
function cycleChart(){
  const W=320,H=190,padL=22,padR=10,padT=12,padB=22;
  const ix=i=>padL+(W-padL-padR)*(i/6),iy=v=>padT+(H-padT-padB)*(1-v/10);
  const cycs=P.map(p=>getCyc(p.key).filter(d=>anyActivity(d,p.key)));
  const glob=[];for(let i=0;i<7;i++){const vals=P.map((p,pi)=>{const d=cycs[pi][i];return d!=null?dayScore(d,p.key):null;}).filter(v=>v!=null);
    glob.push(vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null);}
  if(!glob.some(v=>v!=null))return `<div class="chart-empty">Remplis tes séances pour voir l'évolution de ton cycle — par pilier et en global.</div>`;
  let g='';
  [0,5,10].forEach(v=>{g+=`<line x1="${padL}" y1="${iy(v)}" x2="${W-padR}" y2="${iy(v)}" stroke="rgba(150,175,215,.12)"/><text x="${padL-4}" y="${(iy(v)+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#7e889a">${v}</text>`;});
  for(let i=0;i<7;i++)g+=`<text x="${ix(i).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="#7e889a">J${i+1}</text>`;
  P.forEach((p,pi)=>{const ser=cycs[pi].slice(0,7).map((d,i)=>{const s=d!=null?dayScore(d,p.key):null;return s==null?null:[i,s];});
    let segs=[],cur=[];ser.forEach(pt=>{if(pt)cur.push(pt);else{if(cur.length){segs.push(cur);cur=[]}}});if(cur.length)segs.push(cur);
    segs.forEach(s=>{if(s.length>1)g+=`<path d="${s.map((q,k)=>(k?'L':'M')+ix(q[0]).toFixed(1)+' '+iy(q[1]).toFixed(1)).join(' ')}" fill="none" stroke="${p.c}" stroke-width="1.3" stroke-opacity=".5" stroke-linejoin="round"/>`;
      else g+=`<circle cx="${ix(s[0][0]).toFixed(1)}" cy="${iy(s[0][1]).toFixed(1)}" r="1.8" fill="${p.c}" fill-opacity=".6"/>`;});});
  let gsegs=[],gc=[];glob.forEach((v,i)=>{if(v!=null)gc.push([i,v]);else{if(gc.length){gsegs.push(gc);gc=[]}}});if(gc.length)gsegs.push(gc);
  gsegs.forEach(s=>{if(s.length>1)g+=`<path d="${s.map((q,k)=>(k?'L':'M')+ix(q[0]).toFixed(1)+' '+iy(q[1]).toFixed(1)).join(' ')}" fill="none" stroke="#cdd8ec" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`;});
  glob.forEach((v,i)=>{if(v!=null)g+=`<circle cx="${ix(i).toFixed(1)}" cy="${iy(v).toFixed(1)}" r="3" fill="#fff"/>`;});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${g}</svg>`;}
function renderSynthese(){
  const cy=P.map(p=>cycleStats(p.key));
  const piAvgs=cy.map(r=>r.avg).filter(v=>v!=null);
  const glob=piAvgs.length?piAvgs.reduce((a,b)=>a+b,0)/piAvgs.length:null;
  const active=cy.filter(r=>r.done>0).length;
  const sessions=cy.reduce((a,r)=>a+r.done,0);
  const cards=P.map((p,i)=>{const r=cy[i];
    return `<div class="pcard" data-i="${i}" style="animation-delay:${.05+i*.04}s"><div class="top"><span class="num">0${i+1}</span><span class="nm" style="color:${p.c}">${p.nm}</span></div>${miniGauge(r.avg,p.c)}<div class="pmeta">${r.done}/7 séances</div></div>`;}).join('');
  const gsub=glob==null?'commence une séance pour la calculer':`moyenne de tes ${active} pilier${active>1?'s':''} actif${active>1?'s':''}`;
  document.getElementById('view').innerHTML=`
    <div class="sec-head"><div class="eyebrow">Vue d'ensemble · tes 9 piliers</div><h1>Ton tableau de bord</h1>
      <div class="sec-desc">Chaque pilier a son propre cycle de 7 séances. Voici, pour chacun, ta note moyenne et tes séances réalisées — puis ta note globale.</div></div>
    <div class="stats">
      <div class="stat" style="animation-delay:.05s"><div style="width:115px;flex-shrink:0">${miniGauge(glob,'#8fb0e0')}</div><div><div class="lbl">Note globale</div><div class="big">${glob==null?'—':glob.toFixed(1)}<small> / 10</small></div><div class="lbl" style="margin-top:3px">${gsub}</div></div></div>
      <div class="stat" style="animation-delay:.1s"><div><div class="lbl">Piliers commencés</div><div class="big">${active}<small> / 9</small></div></div></div>
      <div class="stat" style="animation-delay:.15s"><div><div class="lbl">Séances réalisées</div><div class="big">${sessions}</div><div class="lbl" style="margin-top:3px">tous piliers confondus</div></div></div>
    </div>
    <div class="ctitle">Évolution séance par séance</div>
    <div class="chartcard">${cycleChart()}<div class="chart-legend">une ligne par pilier · ligne claire = note globale · J1 → J7 = n° de séance</div></div>
    <div class="ctitle">Note moyenne par pilier</div>
    <div class="grid9">${cards}</div>`;
  document.querySelectorAll('.pcard').forEach(el=>el.onclick=()=>{view=+el.dataset.i;openDay=-2;render();});
}

/* =================== FICHE (week) =================== */
function audioCard(a,c){const link=a.share?`<br><a class="ac-link" href="${a.share}" target="_blank" rel="noopener">Ouvrir dans Suno ↗</a>`:'';
  return `<div class="audiocard"><div class="ac-h" style="color:${c}">🎧 Audio guidé · <b style="color:#fff">${a.title}</b></div><audio controls preload="none" src="${a.url}"></audio>${link}</div>`;}
function audioFor(pk,m,c){if(AUDIO[pk]&&AUDIO[pk][m])return audioCard(AUDIO[pk][m],c);return `<div class="audioslot" data-moment="${m}"></div>`;}
function probeAudio(p){const map={matin:'matin',journee:'midi',soir:'soir'};
  Object.keys(map).forEach(function(gk){const slot=document.querySelector('.audioslot[data-moment="'+gk+'"]');if(!slot)return;
    const tok=map[gk],src='audio/'+p.key+'-'+tok+'.mp3';
    try{fetch(src,{method:'HEAD'}).then(function(r){if(r.ok)slot.innerHTML=audioCard({title:AUDIO_TITLES[tok],url:src},p.c);}).catch(function(){});}catch(e){}});}
function dayBodyHTML(p,di){const date=curSlots[di].date,c=date?cell(date,p.key):null;
  const dateRow=`<div class="daterow"><span class="dr-l">📅 Date de cette séance</span><input type="date" id="dateInp" value="${date||''}"></div>`;
  if(!date)return `<div class="dbody">${dateRow}<div class="dr-hint">Choisis une date pour programmer cette séance, puis remplis-la.</div></div>`;
  const grp=g=>{const items=p.actions[g.k];const sub=g.k==='journee'?`<div class="grp-sub">${p.jl}</div>`:'';
    const au=audioFor(p.key,g.k,p.c);
    const mlb=g.k==='matin'?'du matin':(g.k==='journee'?'du midi':'du soir');
    const mnote=`<div class="mnote"><div class="mnote-lb">✎ Note ${mlb}</div><textarea class="mnote-ta" data-m="${g.k}" placeholder="Ce que j'ai vécu, ressenti, décidé ${mlb}…">${esc((c.notes&&c.notes[g.k])||'')}</textarea></div>`;
    return `<div class="grp"><div class="grp-lb" style="color:${p.c}">${g.ic} ${g.lb}</div>${sub}${au}
    ${items.map((it,ix)=>`<div class="act ${c.a[g.k]&&c.a[g.k][ix]?'on':''}" data-g="${g.k}" data-ix="${ix}" style="--pc:${p.c}">
      <span class="box"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="at"><b>${it[0]}</b><span>${it[1]}</span></span></div>`).join('')}${mnote}</div>`;};
  const valeurs=p.val.map((it,vi)=>{const v=(c.val[vi]!=null)?c.val[vi]:0;
    return `<div class="val-row" data-vi="${vi}"><div class="vt"><span class="vn">${it[0]}</span><span class="vd">${it[1]}</span><span class="vv" id="vv-${vi}">${v}</span></div>
      <input type="range" min="0" max="10" step="1" value="${v}" data-vi="${vi}"></div>`;}).join('');
  return `<div class="dbody">
    ${dateRow}
    ${grp(GROUPS[0])}${grp(GROUPS[1])}${grp(GROUPS[2])}
    <div class="divline"></div>
    <div class="grp-lb" style="color:${p.c}">◈ Mon indicateur du jour</div><div class="grp-sub" style="margin-top:-4px">l'aiguille = tes pratiques faites + ton ressenti</div>
    <div class="meter"><div class="gauge-box">${gaugeMarkup(p.key,p.c)}<div class="poles"><span>${p.low}</span><span>${p.high}</span></div></div><div class="valeurs">${valeurs}</div></div>
    <div class="gcomp" id="gcomp">${compText(date,p.key)}</div>
    <div class="encour" id="encour" style="border-color:${p.c}55">${encourHTML(date,p.key,p.c)}</div>
    <div class="divline"></div>
    <div class="grp-lb" style="color:${p.c}">✎ Bilan du jour</div>
    <div class="recap" id="recap">${recapHTML(c)}</div>
    <textarea id="note" placeholder="Compléter le bilan global du jour…">${esc(c.note||'')}</textarea></div>`;}

function renderFiche(i){const p=P[i];const bs=buildSlots(p.key);curSlots=bs.slots;
  let defIdx=curSlots.findIndex(s=>s.date===tISO());
  if(defIdx<0)defIdx=curSlots.findIndex(s=>s.state==='today');
  if(openDay===-2)openDay=defIdx;
  const days=curSlots.map((s,di)=>{
    if(s.state==='future'){const open=di===openDay;
      return `<div class="day future ${open?'open':''}" style="--pc:${p.c}">
        <div class="dhead" data-di="${di}"><span class="dn">Jour ${s.n}</span><span class="dd">À venir</span>
          <span class="right"><span class="gval">—</span><span class="mds"><span class="mdot"></span><span class="mdot"></span><span class="mdot"></span></span><span class="chev">▶</span></span></div>
        ${open?dayBodyHTML(p,di):''}</div>`;}
    const date=s.date,c=peek(date,p.key),v=dayScore(date,p.key),open=di===openDay;
    const dt=parseISO(date),dd=dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    const md=GROUPS.map(g=>`<span class="mdot" style="${groupDone(c,p,g.k)?`background:${p.c};box-shadow:0 0 7px ${p.c}`:''}"></span>`).join('');
    const tag=date===tISO()?`<span class="badge">Aujourd'hui</span>`:'';
    return `<div class="day ${open?'open':''}" style="--pc:${p.c}">
      <div class="dhead" data-di="${di}"><span class="dn">Jour ${s.n}</span><span class="dd">${dd}</span>${tag}
        <span class="right"><span class="gval">${v==null?'—':v.toFixed(1)}</span><span class="mds">${md}</span><span class="chev">▶</span></span></div>
      ${open?dayBodyHTML(p,di):''}</div>`;}).join('');
  const cycBtn=bs.complete
    ?`<div class="cycdone"><div class="cd-t" style="color:${p.c}">✓ Cycle complet · 7 séances</div><button class="cd-btn" id="newCyc">Commencer un nouveau cycle</button></div>`
    :(getCyc(p.key).length>0?`<div style="text-align:center;margin-top:16px"><button class="cd-link" id="newCyc">Recommencer le cycle</button></div>`:'');
  document.getElementById('view').innerHTML=`<div class="fiche">
    <div class="fhead"><div class="fnav"><button class="arrow" id="prev">‹</button><button class="arrow" id="next">›</button></div>
      <div class="ftitle"><div class="fnum">FICHE 0${i+1} / 09 · CYCLE DE 7 SÉANCES</div><h1 style="color:${p.c}">${p.nm}</h1><div class="intent">« ${p.intent} »</div></div></div>
    <div class="warn ${warnOpen?'open':''}"><div class="warn-h" id="warnH" style="color:${p.c}">⚠ <span>${WARN[p.key].l}</span><span class="wchev">▾</span></div>
      <div class="warn-body"><div class="warn-grid">${WARN[p.key].items.map(it=>`<div class="witem"><span class="wx" style="color:${p.c}">✕</span><div><b>${it[0]}</b><div class="wd">${it[1]}</div></div></div>`).join('')}</div></div></div>
    ${cycleSpark(p.key,p.c)}
    ${days}
    ${cycBtn}
    <div class="fmantra" style="color:${p.c}">« ${p.mantra} »</div></div>`;
  document.getElementById('prev').onclick=()=>{view=(i+8)%9;openDay=-2;render();};
  document.getElementById('next').onclick=()=>{view=(i+1)%9;openDay=-2;render();};
  const wh=document.getElementById('warnH');if(wh)wh.onclick=()=>{warnOpen=!warnOpen;wh.parentElement.classList.toggle('open',warnOpen);};
  const nc=document.getElementById('newCyc');if(nc)nc.onclick=()=>confirmModal('Commencer un nouveau cycle ? Tes séances précédentes restent enregistrées (par date).',()=>{newCycle(p.key);openDay=-2;render();});
  document.querySelectorAll('.dhead[data-di]').forEach(h=>h.onclick=()=>{const di=+h.dataset.di;openDay=(openDay===di)?-1:di;render();
    setTimeout(()=>{const o=document.querySelector('.day.open');if(o)o.scrollIntoView({behavior:'smooth',block:'start'});},60);});
  bindDay(p);
}
function bindDay(p){const di=openDay;if(di<0||!curSlots[di])return;const date=curSlots[di].date;
  const din=document.getElementById('dateInp');if(din)din.onchange=()=>{if(din.value)changeDate(p.key,di,din.value);};
  if(!date)return;
  const c=cell(date,p.key);
  function refresh(){const sc=dayScore(date,p.key);setGauge(p.key,sc,p.c);
    const gc=document.getElementById('gcomp');if(gc)gc.innerHTML=compText(date,p.key);
    const ec=document.getElementById('encour');if(ec)ec.innerHTML=encourHTML(date,p.key,p.c);
    updateHeaderVal(di,sc);}
  refresh();probeAudio(p);
  document.querySelectorAll('.act').forEach(el=>el.onclick=()=>{const g=el.dataset.g,ix=+el.dataset.ix;
    if(!c.a[g])c.a[g]={};c.a[g][ix]=!c.a[g][ix];save(DATA);pushSession(p.key,date);el.classList.toggle('on',c.a[g][ix]);updateHeaderDots(p,di);refresh();});
  document.querySelectorAll('input[type=range]').forEach(inp=>{paint(inp,p.c);
    inp.oninput=()=>{const vi=+inp.dataset.vi;c.val[vi]=+inp.value;save(DATA);pushSession(p.key,date);document.getElementById('vv-'+vi).textContent=inp.value;paint(inp,p.c);refresh();};});
  document.querySelectorAll('.mnote-ta').forEach(t=>{t.oninput=e=>{const m=t.dataset.m;if(!c.notes)c.notes={};c.notes[m]=e.target.value;save(DATA);pushSession(p.key,date);
    const r=document.getElementById('recap');if(r)r.innerHTML=recapHTML(c);};});
  const n=document.getElementById('note');if(n)n.oninput=e=>{c.note=e.target.value;save(DATA);pushSession(p.key,date);};
}
function updateHeaderDots(p,di){const head=document.querySelectorAll('.dhead')[di];if(!head)return;const c=peek(curSlots[di].date,p.key);
  head.querySelectorAll('.mds .mdot').forEach((dot,gi)=>{const g=GROUPS[gi];dot.style.background=groupDone(c,p,g.k)?p.c:'';dot.style.boxShadow=groupDone(c,p,g.k)?`0 0 7px ${p.c}`:'';});}
function updateHeaderVal(di,v){const head=document.querySelectorAll('.dhead')[di];if(head)head.querySelector('.gval').textContent=(v==null?'—':v.toFixed(1));}
function paint(inp,col){const pct=(inp.value/10)*100;inp.style.background=`linear-gradient(90deg,${col} 0%,${col} ${pct}%,rgba(255,255,255,.09) ${pct}%)`;}

/* =================== MASTER =================== */
function render(){renderTop();if(view==='synthese')renderSynthese();else renderFiche(view);if(view==='synthese')window.scrollTo({top:0,behavior:'smooth'});}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function confirmModal(msg,onYes){const ov=document.createElement('div');ov.className='modal-ov';
  ov.innerHTML=`<div class="modal"><div class="modal-msg">${msg}</div><div class="modal-btns"><button class="mb mb-cancel">Annuler</button><button class="mb mb-ok">Confirmer</button></div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('.mb-cancel').onclick=()=>ov.remove();
  ov.querySelector('.mb-ok').onclick=()=>{ov.remove();onYes();};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};}
function changeDate(pk,di,newD){const cyc=getCyc(pk);const oldD=curSlots[di].date;
  if(newD===oldD)return;
  if(cyc.indexOf(newD)>=0){toast('Une séance existe déjà à cette date');render();return;}
  const inCyc=oldD&&cyc.indexOf(oldD)>=0;
  if(oldD&&DATA.days[oldD]&&DATA.days[oldD][pk]){DATA.days[newD]=DATA.days[newD]||{};DATA.days[newD][pk]=DATA.days[oldD][pk];delete DATA.days[oldD][pk];if(Object.keys(DATA.days[oldD]).length===0)delete DATA.days[oldD];}
  if(inCyc){cyc[cyc.indexOf(oldD)]=newD;}
  else{if(cyc.length>=7){toast('Cycle déjà complet (7 séances)');render();return;}cyc.push(newD);}
  cyc.sort();save(DATA);
  openDay=buildSlots(pk).slots.findIndex(s=>s.date===newD);render();}
document.getElementById('resetBtn').onclick=()=>confirmModal('Effacer toutes tes données de pilotage ? Cette action est définitive.',()=>{DATA={days:{},cyc:{}};save(DATA);openDay=-2;view='synthese';toast('Données réinitialisées');render();});
render();
document.addEventListener("visibilitychange",function(){if(!document.hidden)render();});
</script>
</body>
